<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
        (function () {
            const path = window.location.pathname;

            if (path.startsWith("/games/") && path.length > 7) {
                // Store original path so the games shell can restore it
                sessionStorage.setItem("hgb_game_redirect", path);
                window.location.replace("/games/");
            } else if (path.startsWith("/teams/")) {
                sessionStorage.setItem("hgb_requested_path", path);
                window.location.replace("/teams/" + window.location.search + window.location.hash);
            } else {
                window.location.replace("/");
            }
        })();
    </script>
</head>

<body></body>

</html>
