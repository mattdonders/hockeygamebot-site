<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Card Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d0d; color: #fff; font-family: 'Inter', system-ui, sans-serif; padding: 24px; max-width: 520px; margin: 0 auto; }
h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 20px; }
button {
  display: block; width: 100%; padding: 12px; margin-bottom: 12px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 0.06em;
  border-radius: 8px; cursor: pointer; transition: background 0.15s;
}
button:hover, button:active { background: rgba(255,255,255,0.16); }
.preview { margin-top: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
.preview img { display: block; width: 100%; border-radius: 12px; }
.note { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 8px; line-height: 1.5; }

/* ── SHARE CARD (fixed 400px — offscreen for capture) ── */
#share-card {
  width: 400px;
  background: #181818;
  border-radius: 12px;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
}
.sc-accent { height: 4px; background: linear-gradient(90deg, #CE1126 50%, #0038A8 50%); }
.sc-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 4px; }
.sc-status { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: #4fc3f7; }
.sc-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 10px;
  border: 1px solid rgba(255,202,40,0.35); color: #ffca28; background: rgba(255,202,40,0.07); }
.sc-body { display: flex; align-items: center; gap: 8px; padding: 10px 16px; }
.sc-team { flex: 1; display: flex; align-items: center; gap: 8px; }
.sc-team.right { flex-direction: row-reverse; }
.sc-logo { width: 48px; height: 48px; object-fit: contain; }
.sc-abbr { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; color: rgba(255,255,255,0.85); }
.sc-score { font-size: 40px; font-weight: 700; color: #fff; letter-spacing: -0.02em; min-width: 90px; text-align: center; }
.sc-stats { padding: 0 16px 10px; }
.sc-wpbar-wrap { margin-bottom: 8px; }
.sc-wpbar { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.sc-wpfill { height: 100%; border-radius: 3px; }
.sc-wplabel { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,0.4); }
.sc-wplabel span { color: rgba(255,255,255,0.75); }
.sc-stat { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.4); padding: 2px 0; }
.sc-stat span { color: rgba(255,255,255,0.8); }
.sc-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 6px 0; }
.sc-recent { padding: 6px 16px 12px; }
.sc-recent-row { display: flex; gap: 8px; align-items: baseline; padding: 3px 0; }
.sc-recent-icon { font-size: 11px; width: 16px; flex-shrink: 0; }
.sc-recent-desc { font-size: 12px; color: rgba(255,255,255,0.75); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sc-recent-time { font-size: 10px; color: rgba(255,255,255,0.3); flex-shrink: 0; }
.sc-footer { padding: 6px 16px 10px; text-align: right; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<h1>Share Card Preview</h1>
<button onclick="capture()">📸 Generate &amp; Preview</button>
<button onclick="captureAndShare()">⬆ Share</button>
<div class="preview" id="preview"></div>
<p class="note" id="status"></p>

<!-- Fixed 400px card — always offscreen, never affected by screen width -->
<div style="position:fixed;left:-9999px;top:0;">
  <div id="share-card">
    <div class="sc-accent" id="sc-accent"></div>
    <div class="sc-head">
      <div class="sc-status" id="sc-status"></div>
      <div id="sc-badge"></div>
    </div>
    <div class="sc-body">
      <div class="sc-team" id="sc-away-team">
        <img class="sc-logo" id="sc-away-logo" src="" alt="" crossorigin="anonymous">
        <div class="sc-abbr" id="sc-away-abbr"></div>
      </div>
      <div class="sc-score" id="sc-score"></div>
      <div class="sc-team right" id="sc-home-team">
        <img class="sc-logo" id="sc-home-logo" src="" alt="" crossorigin="anonymous">
        <div class="sc-abbr" id="sc-home-abbr"></div>
      </div>
    </div>
    <div class="sc-stats">
      <div class="sc-wpbar-wrap" id="sc-wp-wrap">
        <div class="sc-wpbar"><div class="sc-wpfill" id="sc-wpfill"></div></div>
        <div class="sc-wplabel" id="sc-wplabel"></div>
      </div>
      <div class="sc-stat" id="sc-xg" style="display:none"><span style="color:rgba(255,255,255,0.4)">xG</span><span id="sc-xg-val"></span></div>
      <div class="sc-stat" id="sc-sog" style="display:none"><span style="color:rgba(255,255,255,0.4)">SOG</span><span id="sc-sog-val"></span></div>
    </div>
    <div class="sc-divider"></div>
    <div class="sc-recent" id="sc-recent"></div>
    <div class="sc-footer">hockeygamebot.com</div>
  </div>
</div>

<script>
const LOGO = 'https://assets.nhle.com/logos/nhl/svg/';

// Sample data — will be replaced by real card data in production
const SAMPLE = {
  id: 'test',
  away: 'NJD', home: 'NYR',
  awayScore: 3, homeScore: 2,
  statusText: '2nd · 14:32',
  isLive: true, isFinal: false,
  winProbability: 0.38,
  xgAway: 2.1, xgHome: 1.6,
  awaySog: 22, homeSog: 17,
  teamColor: '#CE1126',
  homeColor: '#0038A8',
  badges: ['PP'],
  recentEvents: [
    { icon: '🥅', desc: 'Hischier (15) — NJD', time: 'P2 · 12:08' },
    { icon: '⚠', desc: 'High-sticking — Smith 2min', time: 'P2 · 13:44' },
    { icon: '🏒', desc: 'Faceoff won — Marino', time: 'P2 · 14:11' },
  ],
};

function populateCard(d) {
  // Accent bar
  document.getElementById('sc-accent').style.background =
    `linear-gradient(90deg, ${d.teamColor} 50%, ${d.homeColor} 50%)`;

  // Status
  const statusEl = document.getElementById('sc-status');
  statusEl.style.color = d.isFinal ? 'rgba(255,255,255,0.4)' : '#4fc3f7';
  statusEl.textContent = d.isFinal ? 'FINAL' : (d.isLive ? '● LIVE · ' : '') + d.statusText;

  // Badges
  const badgeEl = document.getElementById('sc-badge');
  badgeEl.innerHTML = (d.badges || []).map(b =>
    `<span class="sc-badge">${b}</span>`
  ).join(' ');

  // Teams + score
  document.getElementById('sc-away-abbr').textContent = d.away;
  document.getElementById('sc-home-abbr').textContent = d.home;
  document.getElementById('sc-away-logo').src = `${LOGO}${d.away}_light.svg`;
  document.getElementById('sc-home-logo').src = `${LOGO}${d.home}_light.svg`;
  document.getElementById('sc-score').textContent = `${d.awayScore ?? 0}  ·  ${d.homeScore ?? 0}`;

  // Win probability
  if (d.winProbability != null) {
    const homeWP = Math.round(d.winProbability * 100);
    const awayWP = 100 - homeWP;
    const fill = document.getElementById('sc-wpfill');
    fill.style.width = awayWP + '%';
    fill.style.background = `linear-gradient(90deg, ${d.teamColor}, ${d.homeColor})`;
    document.getElementById('sc-wplabel').innerHTML =
      `<span>WIN PROB</span><span>${d.away} ${awayWP}% · ${d.home} ${homeWP}%</span>`;
    document.getElementById('sc-wp-wrap').style.display = '';
  } else {
    document.getElementById('sc-wp-wrap').style.display = 'none';
  }

  // xG
  if (d.xgAway != null && d.xgHome != null) {
    document.getElementById('sc-xg').style.display = '';
    document.getElementById('sc-xg-val').textContent = `${d.away} ${d.xgAway.toFixed(1)} · ${d.home} ${d.xgHome.toFixed(1)}`;
  }

  // SOG
  if (d.awaySog != null && d.homeSog != null) {
    document.getElementById('sc-sog').style.display = '';
    document.getElementById('sc-sog-val').textContent = `${d.away} ${d.awaySog} · ${d.home} ${d.homeSog}`;
  }

  // Recent events
  const recentEl = document.getElementById('sc-recent');
  recentEl.innerHTML = (d.recentEvents || []).map(r =>
    `<div class="sc-recent-row">
      <span class="sc-recent-icon">${r.icon}</span>
      <span class="sc-recent-desc">${r.desc}</span>
      <span class="sc-recent-time">${r.time || ''}</span>
    </div>`
  ).join('');
}

async function renderCard(d) {
  populateCard(d || SAMPLE);
  // Give logos a moment to load
  await new Promise(r => setTimeout(r, 400));
  return html2canvas(document.getElementById('share-card'), {
    backgroundColor: null,
    scale: 2,
    useCORS: true,
    allowTaint: false,
    logging: false,
    width: 400,
  });
}

async function capture() {
  document.getElementById('status').textContent = 'Rendering…';
  try {
    const canvas = await renderCard(SAMPLE);
    const img = new Image();
    img.src = canvas.toDataURL('image/png');
    img.style.borderRadius = '12px';
    const preview = document.getElementById('preview');
    preview.innerHTML = '';
    preview.appendChild(img);
    document.getElementById('status').textContent = `Output: ${canvas.width}×${canvas.height}px (2× retina) — this is what gets shared`;
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}

async function captureAndShare() {
  document.getElementById('status').textContent = 'Rendering…';
  try {
    const canvas = await renderCard(SAMPLE);
    canvas.toBlob(async blob => {
      const file = new File([blob], 'game.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'NJD vs NYR', text: 'NJD 3 · 2 NYR — 2nd · 14:32' });
        document.getElementById('status').textContent = 'Shared!';
      } else {
        // Desktop fallback: download
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = 'game-card.png';
        a.click();
        document.getElementById('status').textContent = 'Downloaded (no share API on desktop)';
      }
    }, 'image/png');
  } catch(e) {
    document.getElementById('status').textContent = e.name === 'AbortError' ? 'Cancelled' : 'Error: ' + e.message;
  }
}

window.addEventListener('load', () => capture());
</script>
</body>
</html>
